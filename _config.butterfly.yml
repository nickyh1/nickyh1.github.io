# --------------------------------------
# Hexo Butterfly Theme Configuration
# Docs: https://butterfly.js.org/
# --------------------------------------

# --------------------------------------
# Navigation Settings
# --------------------------------------

nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: false

# 导航栏菜单 - 三个板块
menu:
  知识笔记: / || fas fa-book-open
  工作经验分享: /work-experience/ || fas fa-briefcase
  酒神精神: /wine/ || fas fa-wine-glass-alt

# --------------------------------------
# Code Blocks Settings
# --------------------------------------

code_blocks:
  theme: light
  macStyle: false
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# Social media links
social:
  # fab fa-github: https://github.com/nickyh1 || Github || '#24292e'

# --------------------------------------
# Image Settings
# --------------------------------------

favicon: /img/favicon.png

avatar:
  img: /img/butterfly-icon.png
  effect: false

disable_top_img: false
default_top_img:
index_img:
archive_img:
tag_img:
tag_per_img:
category_img:
category_per_img:
footer_img: false
background:

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  position: both
  default_cover:

# --------------------------------------
# Post Settings
# --------------------------------------

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

post_edit:
  enable: false

post_pagination:
  enable: true
  prev_next: true

# --------------------------------------
# Aside / Sidebar Settings
# --------------------------------------

aside:
  enable: true
  hide: false
  button: true
  mobile: false
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description:
    button:
      enable: false
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/nickyh1
  card_announcement:
    enable: true
    content: 欢迎来到 Say My Name 博客！
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: false
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:

# --------------------------------------
# Footer Settings
# --------------------------------------

footer:
  owner:
    enable: true
    since: 2026
  custom_text:
  copyright: true

# --------------------------------------
# Search Settings
# --------------------------------------

search:
  use:  # 暂不启用搜索（需要 hexo-generator-search 插件）
  placeholder:
  per_page: 10

local_search:
  enable: false
  preload: false
  CDN:

# --------------------------------------
# Highlight / Prism Settings
# --------------------------------------

highlight_theme: light
highlight_copy: true
highlight_lang: true
highlight_shrink: false
highlight_height_limit: false
code_word_wrap: false

# --------------------------------------
# Comments
# --------------------------------------

comments:
  use:
  text: true
  lazyload: false
  count: false
  card_post_count: false

# --------------------------------------
# Math
# --------------------------------------

math:
  use: mathjax

mathjax:
  enable: false
  per_page: false

katex:
  enable: false
  per_page: false
  hide_scrollbar: true

# --------------------------------------
# Mermaid
# --------------------------------------

mermaid:
  enable: false
  theme: default

# --------------------------------------
# Loading
# --------------------------------------

loading:
  fullpage: false
  pace: false
  pace_css_url:

# --------------------------------------
# Pjax
# --------------------------------------

pjax:
  enable: false
  exclude:

# --------------------------------------
# Lazy Load
# --------------------------------------

lazyload:
  enable: true
  field: site
  placeholder:
  blur: false

# --------------------------------------
# Inject
# --------------------------------------

inject:
  head:
  bottom:

# --------------------------------------
# CDN
# --------------------------------------

CDN:
  option:
    algolia_search:
    instantsearch:
    pjax:
    typed:
    pangu:
    fancybox_css:
    fancybox:
    medium_zoom:
    snackbar_css:
    snackbar:
    activate_power_mode:
    fireworks:
    Christmas_tree:
    heart_js:
    cursor_css:
    cursor_js:
    gitter:
    chat_btn_css:
    chat_btn_js:

# --------------------------------------
# Theme Color
# --------------------------------------

theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#00c4b6"
  blockquote_padding_color: "#49b1f5"
  blockquote_background_color: "#49b1f5"
  scrollbar_color: "#49b1f5"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#0d0d0d"
